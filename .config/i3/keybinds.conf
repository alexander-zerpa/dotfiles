### Key bindings

### Variables

# Logo key. Use Mod1 for Alt.
set $mod Mod4

# Home row direction keys, like vim
set $left h
set $down j
set $up k
set $right l

# Define names for default workspaces for which we configure key bindings later on.
# We use variables to avoid repeating the names in multiple places.
set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"

#
# Basics:
#
    # Start a terminal
    bindsym $mod+Return exec $term

    # Kill focused window
    bindsym $mod+q kill

    # Start your launcher
    bindsym $mod+p exec $menu
    bindsym $mod+Shift+p exec $runner

    # Lock screen
    bindsym $mod+Shift+Escape exec $lock

    # Drag floating windows by holding down $mod and left mouse button.
    # Resize them with right mouse button + $mod.
    # Despite the name, also works for non-floating windows.
    # Change normal to inverse to use left mouse button for resizing and right
    # mouse button for dragging.
    floating_modifier $mod

    # Reload the configuration file
    bindsym $mod+Shift+r reload

    # restart i3 inplace (preserves your layout/session, can be used to upgrade i3)
    # bindsym $mod+Control+r restart

    # Exit sway (logs you out of your Wayland session)
    bindsym $mod+Shift+q exit

    # Kill window on right-click
    bindsym button3 kill
#
# Moving around:
#
    # Move your focus around
    bindsym $mod+$left focus left
    bindsym $mod+$down focus down
    bindsym $mod+$up focus up
    bindsym $mod+$right focus right
    # Or use $mod+[up|down|left|right]
    bindsym $mod+Left focus left
    bindsym $mod+Down focus down
    bindsym $mod+Up focus up
    bindsym $mod+Right focus right

    # Move the focused window with the same, but add Shift
    bindsym $mod+Shift+$left move left
    bindsym $mod+Shift+$down move down
    bindsym $mod+Shift+$up move up
    bindsym $mod+Shift+$right move right
    # Ditto, with arrow keys
    bindsym $mod+Shift+Left move left
    bindsym $mod+Shift+Down move down
    bindsym $mod+Shift+Up move up
    bindsym $mod+Shift+Right move right

    # Cycle workspaces
    bindsym $mod+tab focus next sibling
    bindsym $mod+Shift+tab focus prev sibling
#
# Workspaces:
#
    # Switch to workspace
    bindsym $mod+1 workspace number $ws1
    bindsym $mod+2 workspace number $ws2
    bindsym $mod+3 workspace number $ws3
    bindsym $mod+4 workspace number $ws4
    bindsym $mod+5 workspace number $ws5
    bindsym $mod+6 workspace number $ws6
    bindsym $mod+7 workspace number $ws7
    bindsym $mod+8 workspace number $ws8
    bindsym $mod+9 workspace number $ws9
    bindsym $mod+0 workspace number $ws10
    # Move focused container to workspace
    bindsym $mod+Shift+1 move container to workspace number $ws1
    bindsym $mod+Shift+2 move container to workspace number $ws2
    bindsym $mod+Shift+3 move container to workspace number $ws3
    bindsym $mod+Shift+4 move container to workspace number $ws4
    bindsym $mod+Shift+5 move container to workspace number $ws5
    bindsym $mod+Shift+6 move container to workspace number $ws6
    bindsym $mod+Shift+7 move container to workspace number $ws7
    bindsym $mod+Shift+8 move container to workspace number $ws8
    bindsym $mod+Shift+9 move container to workspace number $ws9
    bindsym $mod+Shift+0 move container to workspace number $ws10
    # Note: workspaces can have any name you want, not just numbers.
    # We just use 1-10 as the default.
    # Cycle workspaces
    # bindsym $mod+tab workspace next_on_output
    # bindsym $mod+Shift+tab workspace next_on_output
#
# Outputs:
#
    # Move your focus around
    bindsym $mod+Control+$left focus output left
    bindsym $mod+Control+$down focus output down
    bindsym $mod+Control+$up focus output up
    bindsym $mod+Control+$right focus output right
    # Or use $mod+[up|down|left|right]
    bindsym $mod+Control+Left focus output left
    bindsym $mod+Control+Down focus output down
    bindsym $mod+Control+Up focus output up
    bindsym $mod+Control+Right focus output right

    # Move the focused window with the same, but add Shift
    bindsym $mod+Control+Shift+$left move container to output left; focus output left
    bindsym $mod+Control+Shift+$down move container to output down; focus output down
    bindsym $mod+Control+Shift+$up move container to output up; focus output up
    bindsym $mod+Control+Shift+$right move container to output right; focus output right
    # Ditto, with arrow keys
    bindsym $mod+Control+Shift+Left move container to output left; focus output left
    bindsym $mod+Control+Shift+Down move container to output down; focus output down
    bindsym $mod+Control+Shift+Up move container to output up; focus output up
    bindsym $mod+Control+Shift+Right move container to output right; focus output right

    # Move the focused workspace with the same, but add Shift
    bindsym $mod+Alt+Control+Shift+$left move workspace to output left
    bindsym $mod+Alt+Control+Shift+$down move workspace to output down
    bindsym $mod+Alt+Control+Shift+$up move workspace to output up
    bindsym $mod+Alt+Control+Shift+$right move workspace to output right
    # Ditto, with arrow keys
    bindsym $mod+Alt+Control+Shift+Left move workspace to output left
    bindsym $mod+Alt+Control+Shift+Down move workspace to output down
    bindsym $mod+Alt+Control+Shift+Up move workspace to output up
    bindsym $mod+Alt+Control+Shift+Right move workspace to output right
#
# Layout stuff:
#
    # You can "split" the current object of your focus with
    # $mod+b or $mod+v, for horizontal and vertical splits
    # respectively.
    bindsym $mod+b splith
    bindsym $mod+v splitv
    bindsym $mod+s splitt
    bindsym $mod+Shift+s split none

    # Switch the current container between different layout styles
    bindsym $mod+m layout toggle tabbed split
    # bindsym $mod+t layout tabbed
    bindsym $mod+d layout toggle split

    # Make the current focus fullscreen
    bindsym $mod+f fullscreen

    # Toggle the current focus between tiling and floating mode
    bindsym $mod+Shift+space floating toggle

    # Swap focus between the tiling area and the floating area
    bindsym $mod+space focus mode_toggle

    # Make the current floating focus sticky
    bindsym $mod+Control+space sticky toggle

    # Move focus to the parent container
    bindsym $mod+a focus parent

    # Move focus to the child container
    bindsym $mod+Shift+a focus child

    # toggle gaps
    bindsym $mod+Control+g gaps inner current toggle $gaps

#
# Scratchpad:
#
    # Sway has a "scratchpad", which is a bag of holding for windows.
    # You can send windows there and get them back later.

    # Move the currently focused window to the scratchpad
    bindsym $mod+Shift+x move scratchpad

    # Show the next scratchpad window or hide the focused scratchpad window.
    # If there are multiple scratchpad windows, this command cycles through them.
    bindsym $mod+x scratchpad show
#
# Resizing containers:
#
mode "resize" {
    # left will shrink the containers width
    # right will grow the containers width
    # up will shrink the containers height
    # down will grow the containers height
    bindsym $left resize shrink width 10px
    bindsym $down resize grow height 10px
    bindsym $up resize shrink height 10px
    bindsym $right resize grow width 10px

    # Ditto, with arrow keys
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px

    # Return to default mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"

#
# Utilities:
#
    # Special keys to adjust volume via PulseAudio
    bindsym XF86AudioMute exec wpctl set-mute \@DEFAULT_SINK@ toggle
    bindsym XF86AudioLowerVolume exec wpctl set-volume \@DEFAULT_SINK@ 5%-
    bindsym XF86AudioRaiseVolume exec wpctl set-volume \@DEFAULT_SINK@ 5%+
    bindsym XF86AudioMicMute exec wpctl set-mute \@DEFAULT_SOURCE@ toggle
    # Special keys to adjust brightness via brightnessctl
    bindsym XF86MonBrightnessDown exec brightnessctl set 5%-
    bindsym XF86MonBrightnessUp exec brightnessctl set 5%+
    # Special key to take a screenshot with grim
    # bindsym Print exec grim
